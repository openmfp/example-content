name: pipe
on:
  push:
    branches:
      - main
  pull_request:
    types:
      - opened
      - synchronize

concurrency:
  group: ${{ github.ref }}
  cancel-in-progress: true

jobs:
  pipe:
    uses: openmfp/gha/.github/workflows/pipeline-node-app.yml@2248d0a0bccd123f7cdafaa8fee5b25f526cc64d # main
    secrets: inherit
    with:
      imageTagName: ghcr.io/openmfp/example-content
      componentVersionKey: example-content
      repoVersionUpdate: openmfp/helm-charts